[build]
  functions = "netlify/functions"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[redirects]]
  from = "/api/writing-feed"
  to = "/.netlify/functions/writing-feed"
  status = 200

[[redirects]]
  from = "/api/ask"
  to = "/.netlify/functions/ask"
  status = 200
