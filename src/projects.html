<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — AJ91</title>
  <script>
    (function () {
      function setVh() {
        var v = window.visualViewport;
        var vh = (v && v.height) ? v.height : window.innerHeight;
        document.documentElement.style.setProperty('--vh', vh + 'px');
      }
      setVh();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setVh);
        window.visualViewport.addEventListener('scroll', setVh);
      }
      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', function () { setTimeout(setVh, 100); });
      document.addEventListener('DOMContentLoaded', setVh);
      setTimeout(setVh, 500);
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous">
</head>

<body data-barba="wrapper" class="page-is-projects">
  <div class="container">
    <header class="header">
      <div class="header-inner">
        <a href="/" class="header-logo logo word font-kihim">aj91</a>
        <nav class="header-nav navigation" aria-label="Main">
          <ul>
            <li><a class="font-mono" href="https://www.linkedin.com/in/asjones91/" aria-label="LinkedIn"><i
                  class="fa-brands fa-linkedin" aria-hidden="true"></i><span class="nav-text">Linkedin</span></a></li>
            <li><a class="font-mono" href="https://aj91.substack.com/" aria-label="Substack"><i
                  class="fa-solid fa-newspaper" aria-hidden="true"></i><span class="nav-text">Substack</span></a></li>
          </ul>
        </nav>
        <button class="menuToggle" id="menu-toggle" type="button" aria-expanded="false" aria-controls="menu-panel"
          aria-label="Toggle menu">
          <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="cross">
            <span></span>
            <span></span>
          </div>
        </button>
      </div>
    </header>

    <main data-barba="container" data-barba-namespace="projects">
      <div class="page-projects layout-morph">
        <div class="page-projects-content">
          <header class="page-projects-header">
            <h1 class="page-projects-title">A sample of my work</h1>
            <p class="page-projects-subtitle">From startups to enterprise — implementations, product, and ventures.</p>
          </header>

          <div id="projects-loading" class="page-projects-grid">
            <article class="page-projects-card page-projects-card--skeleton">
              <div class="page-projects-card-thumb-skeleton"></div>
              <div class="page-projects-card-body">
                <div class="page-projects-skeleton-line page-projects-skeleton-line--title"></div>
                <div class="page-projects-skeleton-line"></div>
                <div class="page-projects-skeleton-line page-projects-skeleton-line--short"></div>
              </div>
            </article>
            <article class="page-projects-card page-projects-card--skeleton">
              <div class="page-projects-card-thumb-skeleton"></div>
              <div class="page-projects-card-body">
                <div class="page-projects-skeleton-line page-projects-skeleton-line--title"></div>
                <div class="page-projects-skeleton-line"></div>
                <div class="page-projects-skeleton-line page-projects-skeleton-line--short"></div>
              </div>
            </article>
            <article class="page-projects-card page-projects-card--skeleton">
              <div class="page-projects-card-thumb-skeleton"></div>
              <div class="page-projects-card-body">
                <div class="page-projects-skeleton-line page-projects-skeleton-line--title"></div>
                <div class="page-projects-skeleton-line"></div>
                <div class="page-projects-skeleton-line page-projects-skeleton-line--short"></div>
              </div>
            </article>
          </div>
          <p id="projects-error" class="page-projects-subtitle" style="display:none; color:#f87171;"></p>
          <div id="page-projects-grid" class="page-projects-grid" style="display:none"></div>
        </div>
      </div>
    </main>
  </div>
  <script>
    (function () {
      if (window.location.port === "1234") window.API_ORIGIN = "http://localhost:3000";
      const API = (window.API_ORIGIN || window.location.origin);

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s || "";
        return div.innerHTML;
      }

      fetch(API + "/api/projects")
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("projects-loading").remove();
          if (data.error) {
            document.getElementById("projects-error").textContent = data.error || "Failed to load projects.";
            document.getElementById("projects-error").style.display = "block";
            return;
          }
          const projects = data.projects || [];
          if (projects.length === 0) {
            document.getElementById("projects-error").textContent = "No projects yet.";
            document.getElementById("projects-error").style.display = "block";
            return;
          }
          const grid = document.getElementById("page-projects-grid");
          grid.style.display = "grid";
          const thumbSrc = (p) => p.thumbnail || p.hero_image || "";
          grid.innerHTML = projects.map((p) => {
            const tags = (p.tags || []).map((t) => `<span>${escapeHtml(t)}</span>`).join("");
            const link = p.slug ? `project.html?slug=${encodeURIComponent(p.slug)}` : "#";
            const thumb = thumbSrc(p);
            return `
            <article class="page-projects-card">
              ${thumb ? `<a href="${link}" class="page-projects-card-thumb" tabindex="-1" aria-hidden="true"><img src="${escapeHtml(thumb)}" alt="" loading="lazy"></a>` : ""}
              <div class="page-projects-card-body">
                <h3 class="page-projects-card-title">${escapeHtml(p.title || "Untitled")}</h3>
                <p class="page-projects-card-desc">${escapeHtml(p.excerpt || "")}</p>
                ${tags ? `<div class="page-projects-card-tags">${tags}</div>` : ""}
                <a href="${link}" class="page-projects-card-link font-mono">View project →</a>
              </div>
            </article>
          `;
          }).join("");
        })
        .catch(() => {
          document.getElementById("projects-loading").remove();
          document.getElementById("projects-error").textContent = "Failed to load projects.";
          document.getElementById("projects-error").style.display = "block";
        });
    })();
  </script>
  <nav class="project-nav-panel" id="project-nav-panel" aria-label="Mobile navigation" aria-hidden="true">
    <div class="project-nav-links">
      <a href="/" class="project-nav-link">Home</a>
      <a href="projects.html" class="project-nav-link">Projects</a>
      <a href="services.html" class="project-nav-link">Services</a>
      <a href="https://aj91.substack.com/" target="_blank" rel="noopener" class="project-nav-link">Latest Blog</a>
    </div>
    <div class="project-nav-footer">
      <a href="https://www.linkedin.com/in/asjones91/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://aj91.substack.com/" target="_blank" rel="noopener">Substack</a>
    </div>
  </nav>
  <script>
    (function () {
      var toggle = document.getElementById('menu-toggle');
      var panel  = document.getElementById('project-nav-panel');
      if (!toggle || !panel) return;
      var backdrop = document.createElement('div');
      backdrop.className = 'project-nav-backdrop';
      document.body.appendChild(backdrop);
      var open = false;
      function openPanel() {
        open = true;
        panel.classList.add('is-open');
        panel.setAttribute('aria-hidden', 'false');
        backdrop.classList.add('is-open');
        toggle.classList.add('active');
        toggle.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
      }
      function closePanel() {
        open = false;
        panel.classList.remove('is-open');
        panel.setAttribute('aria-hidden', 'true');
        backdrop.classList.remove('is-open');
        toggle.classList.remove('active');
        toggle.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      }
      toggle.addEventListener('click', function () { open ? closePanel() : openPanel(); });
      backdrop.addEventListener('click', closePanel);
      panel.querySelectorAll('a').forEach(function (a) { a.addEventListener('click', closePanel); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && open) closePanel(); });
    })();
  </script>
  <script type="module" src="loader.js"></script>
</body>

</html>
