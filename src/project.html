<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — AJ91</title>
  <script>
    (function () {
      function setVh() {
        var v = window.visualViewport;
        var vh = (v && v.height) ? v.height : window.innerHeight;
        document.documentElement.style.setProperty('--vh', vh + 'px');
      }
      setVh();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setVh);
        window.visualViewport.addEventListener('scroll', setVh);
      }
      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', function () { setTimeout(setVh, 100); });
      document.addEventListener('DOMContentLoaded', setVh);
      setTimeout(setVh, 500);
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    .project-page { min-height: 100vh; }
    .project-hero { min-height: 100vh; display: flex; align-items: flex-end; padding-bottom: 2rem; }
    .project-hero-inner { display: grid; grid-template-columns: 1fr 1rem 1fr; gap: 2rem; width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 2rem; align-items: end; }
    .project-hero-image { position: relative; overflow: hidden; opacity: 0; transform: scale(0.95); transform-origin: bottom; filter: blur(8px); }
    .project-hero-image img { width: 100%; height: auto; object-fit: cover; filter: grayscale(100%); }
    .project-hero-text { padding-left: 1rem; text-align: right; overflow: hidden; }
    .project-hero-text p { font-size: 1.125rem; line-height: 1.6; color: rgba(255,255,255,0.85); opacity: 0; transform: translateY(3rem); filter: blur(5px); }
    .project-title-row { margin-top: 10rem; margin-bottom: 4rem; }
    .project-title { font-size: clamp(2rem, 5vw, 4rem); font-weight: 600; color: rgba(255,255,255,0.95); letter-spacing: -0.02em; }
    .project-gallery { min-height: 100vh; display: flex; align-items: center; padding: 4rem 0; overflow: hidden; }
    .project-gallery-inner { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    .project-gallery-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 3rem; }
    .project-gallery-item { flex: 0 0 min(25rem, 100%); height: 28rem; overflow: hidden; position: relative; }
    .project-gallery-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: filter 0.5s ease; clip-path: inset(100% 0 0 0); }
    .project-gallery-item:hover img { filter: grayscale(0%); }
    .project-gallery-caption { max-width: 48rem; margin: 0 auto; font-size: 1rem; line-height: 1.6; color: rgba(255,255,255,0.7); opacity: 0; transform: translateY(2rem); filter: blur(5px); }
    .project-footer { min-height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; position: relative; }
    .project-footer-cta { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; opacity: 0; filter: blur(5px); transform: translateY(1rem); }
    .project-footer-cta a { color: rgba(255,255,255,0.9); text-decoration: none; }
    .project-footer-cta .cta-label { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); }
    .project-scroll-indicator { position: fixed; top: 0; left: 0; height: 2px; background: rgba(255,255,255,0.9); z-index: 100; width: 0; transition: width 0.1s linear; }
    .project-back { position: fixed; top: 1.5rem; left: 2rem; z-index: 50; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; }
    .project-back:hover { color: #fff; }
    .project-loading { padding: 4rem 2rem; text-align: center; color: rgba(255,255,255,0.6); }
    .project-error { padding: 4rem 2rem; text-align: center; color: #f87171; }
    @media (max-width: 768px) {
      .project-hero-inner { grid-template-columns: 1fr; }
      .project-hero-text { text-align: left; padding-left: 0; }
    }
  </style>
</head>
<body>
  <div class="project-scroll-indicator" id="scroll-indicator"></div>
  <a href="projects.html" class="project-back font-mono">← Back</a>
  <div class="container">
    <header class="header">
      <div class="header-inner">
        <a href="/" class="header-logo logo word font-kihim">aj91</a>
        <nav class="header-nav navigation" aria-label="Main">
          <ul>
            <li><a class="font-mono" href="https://www.linkedin.com/in/asjones91/" aria-label="LinkedIn"><i class="fa-brands fa-linkedin" aria-hidden="true"></i><span class="nav-text">Linkedin</span></a></li>
            <li><a class="font-mono" href="https://aj91.substack.com/" aria-label="Substack"><i class="fa-solid fa-newspaper" aria-hidden="true"></i><span class="nav-text">Substack</span></a></li>
          </ul>
        </nav>
        <button class="menuToggle" id="menu-toggle" type="button" aria-expanded="false" aria-controls="menu-panel" aria-label="Toggle menu">
          <div class="hamburger"><span></span><span></span><span></span></div>
          <div class="cross"><span></span><span></span></div>
        </button>
      </div>
    </header>

    <main class="project-page" data-barba="container" data-barba-namespace="project">
      <div id="project-loading" class="project-loading">Loading…</div>
      <div id="project-error" class="project-error" style="display:none"></div>
      <div id="project-content" style="display:none">
        <section class="project-hero">
          <div class="project-hero-inner">
            <div class="project-title-row">
              <h1 class="project-title" id="project-title"></h1>
            </div>
            <div></div>
            <div></div>
            <div class="project-hero-image">
              <img id="project-hero-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
            </div>
            <div></div>
            <div class="project-hero-text">
              <p id="project-about"></p>
            </div>
          </div>
        </section>
        <section class="project-gallery" id="project-gallery">
          <div class="project-gallery-inner">
            <div class="project-gallery-grid" id="project-gallery-grid"></div>
            <div class="project-gallery-caption" id="project-gallery-caption"></div>
          </div>
        </section>
        <section class="project-footer">
          <div class="project-footer-cta" id="project-footer-cta"></div>
        </section>
      </div>
    </main>
  </div>
  <script>
    if (window.location.port === "1234") window.API_ORIGIN = "http://localhost:3000";
  </script>
  <script type="module">
    import { init } from "./project-page.js";
    init();
  </script>
  <script type="module" src="loader.js"></script>
</body>
</html>
