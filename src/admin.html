<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CMS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #e5e5e5; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.125rem; margin: 1.5rem 0 0.75rem; }
    form { max-width: 36rem; }
    label { display: block; font-size: 0.875rem; margin-bottom: 0.25rem; color: #a3a3a3; }
    input, textarea { width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 1rem; border: 1px solid #404040; border-radius: 6px; background: #262626; color: #e5e5e5; font-size: 1rem; }
    textarea { min-height: 6rem; resize: vertical; }
    button { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: none; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #404040; color: #e5e5e5; margin-left: 0.5rem; }
    .btn-danger { background: #dc2626; color: white; }
    .error { color: #f87171; font-size: 0.875rem; margin-bottom: 1rem; }
    .success { color: #4ade80; font-size: 0.875rem; margin-bottom: 1rem; }
    #login-view, #posts-view, #projects-view, #edit-view, #edit-project-view, #dots-view, #edit-dot-view { display: none; }
    #login-view.active, #posts-view.active, #projects-view.active, #edit-view.active, #edit-project-view.active, #dots-view.active, #edit-dot-view.active { display: block; }
    .dot-list { list-style: none; }
    .dot-list li { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; border: 1px solid #404040; border-radius: 6px; margin-bottom: 0.5rem; background: #262626; gap: 1rem; }
    .dot-list li .dot-info { flex: 1; }
    .dot-list li .dot-label { font-weight: 600; }
    .dot-list li .dot-meta { font-size: 0.75rem; color: #737373; margin-top: 0.15rem; }
    .coord { font-size: 0.75rem; color: #737373; font-family: monospace; }
    .post-list, .project-list { list-style: none; }
    .post-list li, .project-list li { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; border: 1px solid #404040; border-radius: 6px; margin-bottom: 0.5rem; background: #262626; }
    .post-list li span, .project-list li span { flex: 1; }
    .slug { font-size: 0.75rem; color: #737373; }
    .published { font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 4px; }
    .published.yes { background: #166534; color: #86efac; }
    .published.no { background: #422006; color: #fcd34d; }
    .actions { display: flex; gap: 0.5rem; }
    .checkbox-wrap { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .checkbox-wrap input { width: auto; margin: 0; }
    .logout { font-size: 0.875rem; color: #737373; cursor: pointer; margin-left: 1rem; }
    .logout:hover { color: #a3a3a3; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tabs button { padding: 0.5rem 1rem; background: #404040; color: #e5e5e5; }
    .tabs button.active { background: #3b82f6; color: white; }
    .help { font-size: 0.75rem; color: #737373; margin-top: -0.5rem; margin-bottom: 1rem; }

    /* ── Writer ─────────────────────────────────────────────────────────── */
    body.writing { padding: 0; overflow: hidden; }
    #edit-view.active { display: flex !important; flex-direction: column; position: fixed; inset: 0; background: #0d0c0a; z-index: 50; height: 100vh; }
    .wr-bar { display: flex; align-items: center; gap: 0.75rem; padding: 0.45rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.78rem; font-family: ui-monospace, monospace; flex-shrink: 0; }
    .wr-back { background: none; border: none; color: rgba(255,255,255,0.35); cursor: pointer; font: inherit; padding: 0; }
    .wr-back:hover { color: #abf8fe; }
    .wr-filename { color: rgba(255,255,255,0.4); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .wr-savestatus { color: rgba(255,255,255,0.25); transition: color 0.2s; }
    .wr-savestatus.saving { color: #fcd34d; }
    .wr-savestatus.error { color: #f87171; }
    .wr-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 1.25rem; padding: 0.65rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
    .wr-title-inp { background: none; border: none; color: rgba(255,255,255,0.88); font-size: 1rem; font-weight: 600; padding: 0; outline: none; min-width: 200px; flex: 1; }
    .wr-title-inp::placeholder { color: rgba(255,255,255,0.18); }
    .wr-mf { display: flex; align-items: center; gap: 0.35rem; }
    .wr-mf label { font-size: 0.68rem; color: rgba(255,255,255,0.28); font-family: ui-monospace, monospace; white-space: nowrap; }
    .wr-mf input { background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); font-size: 0.78rem; padding: 0.1rem 0.2rem; outline: none; width: 140px; font-family: ui-monospace, monospace; margin: 0; }
    .wr-mf input:focus { border-bottom-color: rgba(171,248,254,0.5); color: rgba(255,255,255,0.9); }
    .wr-mf input#edit-thumbnail { width: 200px; }
    .wr-toolbar { display: flex; align-items: center; gap: 1px; padding: 0.3rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
    .wr-t { background: none; border: none; color: rgba(255,255,255,0.32); cursor: pointer; font-family: ui-monospace, monospace; font-size: 0.72rem; padding: 0.22rem 0.4rem; border-radius: 3px; transition: color 0.12s, background 0.12s; }
    .wr-t:hover { color: #abf8fe; background: rgba(171,248,254,0.06); }
    .wr-t.wr-italic { font-style: italic; }
    .wr-div { color: rgba(255,255,255,0.1); padding: 0 0.3rem; user-select: none; font-size: 0.8rem; }
    .wr-sp { flex: 1; }
    .wr-pub { display: flex; align-items: center; gap: 0.35rem; font-size: 0.72rem; font-family: ui-monospace, monospace; color: rgba(255,255,255,0.32); cursor: pointer; }
    .wr-pub input { width: auto; margin: 0; accent-color: #abf8fe; }
    .wr-pub.live { color: #86efac; }
    .wr-t.wr-save-btn { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.65); padding: 0.22rem 0.8rem; }
    .wr-t.wr-save-btn:hover { background: rgba(171,248,254,0.1); color: #abf8fe; }
    .wr-body { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 2.5rem 1.5rem 4rem; }
    .wr-editor { width: 100%; max-width: 700px; background: none; border: none; outline: none; color: rgba(255,255,255,0.8); font-size: var(--wr-fs, 1rem); line-height: var(--wr-lh, 1.85); resize: none; font-family: var(--wr-ff, ui-sans-serif, system-ui, sans-serif); min-height: 60vh; }
    .wr-editor::placeholder { color: rgba(255,255,255,0.12); }
    .wr-statusbar { display: flex; align-items: center; gap: 1rem; padding: 0.3rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.05); font-family: ui-monospace, monospace; font-size: 0.68rem; color: rgba(255,255,255,0.28); flex-shrink: 0; }
    .wr-gbar { display: flex; align-items: center; gap: 0.4rem; }
    .wr-gtrack { width: 64px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; overflow: hidden; }
    .wr-gfill { height: 100%; background: #abf8fe; border-radius: 1px; transition: width 0.4s; }
    .wr-gfill.done { background: #86efac; }
    .wr-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(6px); }
    .wr-modal.hidden { display: none; }
    .wr-modal-box { background: #18170f; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 1.4rem; width: 360px; font-family: ui-monospace, monospace; }
    .wr-modal-box h3 { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-bottom: 1rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; }
    .wr-modal-box input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; color: rgba(255,255,255,0.85); padding: 0.45rem 0.65rem; font-size: 0.8rem; margin-bottom: 0.65rem; font-family: inherit; outline: none; }
    .wr-modal-box input:focus { border-color: rgba(171,248,254,0.35); }
    .wr-modal-acts { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .wr-modal-acts button { font-family: inherit; font-size: 0.72rem; padding: 0.35rem 0.8rem; border-radius: 5px; border: none; cursor: pointer; }
    .wr-mbtn-ok { background: rgba(171,248,254,0.1); color: #abf8fe; border: 1px solid rgba(171,248,254,0.2) !important; }
    .wr-mbtn-ok:hover { background: rgba(171,248,254,0.18); }
    .wr-mbtn-cancel { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.45); }
    .wr-mbtn-cancel:hover { background: rgba(255,255,255,0.1); }
    @media print { .wr-bar,.wr-meta,.wr-toolbar,.wr-statusbar { display:none !important; } .wr-body { padding: 0 !important; } .wr-editor { font-family: Georgia, serif !important; color: #000 !important; } }
  </style>
</head>
<body>
  <div id="login-view" class="active">
    <h1>Admin Login</h1>
    <p id="login-error" class="error" style="display:none"></p>
    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
      <button type="submit" class="btn-primary">Sign in</button>
    </form>
  </div>

  <div id="posts-view">
    <h1>Posts <span class="logout" id="logout">Sign out</span></h1>
    <div class="tabs">
      <button type="button" class="active" data-tab="posts">Posts</button>
      <button type="button" data-tab="projects">Projects</button>
      <button type="button" data-tab="dots">Globe Dots</button>
    </div>
    <p id="posts-error" class="error" style="display:none"></p>
    <p id="posts-success" class="success" style="display:none"></p>
    <button type="button" class="btn-primary" id="new-post">New post</button>
    <h2>All posts</h2>
    <ul id="post-list" class="post-list"></ul>
  </div>

  <div id="projects-view">
    <h1>Projects <span class="logout" id="logout-projects">Sign out</span></h1>
    <div class="tabs">
      <button type="button" data-tab="posts">Posts</button>
      <button type="button" class="active" data-tab="projects">Projects</button>
      <button type="button" data-tab="dots">Globe Dots</button>
    </div>
    <p id="projects-error" class="error" style="display:none"></p>
    <p id="projects-success" class="success" style="display:none"></p>
    <button type="button" class="btn-primary" id="new-project">New project</button>
    <h2>All projects</h2>
    <ul id="project-list" class="project-list"></ul>
  </div>

  <div id="dots-view">
    <h1>Globe Dots <span class="logout" id="logout-dots">Sign out</span></h1>
    <div class="tabs">
      <button type="button" data-tab="posts">Posts</button>
      <button type="button" data-tab="projects">Projects</button>
      <button type="button" class="active" data-tab="dots">Globe Dots</button>
    </div>
    <p id="dots-error" class="error" style="display:none"></p>
    <p id="dots-success" class="success" style="display:none"></p>
    <button type="button" class="btn-primary" id="new-dot">Add dot</button>
    <h2>All dots</h2>
    <ul id="dot-list" class="dot-list"></ul>
  </div>

  <div id="edit-dot-view">
    <h1 id="edit-dot-title">New dot</h1>
    <p id="edit-dot-error" class="error" style="display:none"></p>
    <form id="edit-dot-form">
      <input type="hidden" id="edit-dot-id">
      <label for="edit-dot-label">Label (city name)</label>
      <input type="text" id="edit-dot-label" required placeholder="New York, NY">
      <label for="edit-dot-lat">Latitude</label>
      <input type="number" id="edit-dot-lat" required step="any" placeholder="40.7128">
      <label for="edit-dot-lng">Longitude</label>
      <input type="number" id="edit-dot-lng" required step="any" placeholder="-74.0060">
      <p class="help">Tip: find lat/lng at <a href="https://www.latlong.net" target="_blank" style="color:#3b82f6">latlong.net</a></p>
      <label for="edit-dot-year">Year / period</label>
      <input type="text" id="edit-dot-year" placeholder="2019–2021">
      <label for="edit-dot-text">Tooltip text</label>
      <textarea id="edit-dot-text" placeholder="What happened here?"></textarea>
      <label for="edit-dot-order">Sort order</label>
      <input type="number" id="edit-dot-order" value="0" step="1">
      <button type="submit" class="btn-primary">Save</button>
      <button type="button" class="btn-secondary" id="edit-dot-cancel">Cancel</button>
    </form>
  </div>

  <div id="edit-view">
    <!-- top bar -->
    <div class="wr-bar">
      <button class="wr-back" id="wr-back">← posts</button>
      <span class="wr-filename" id="wr-filename">untitled.md</span>
      <span class="wr-savestatus" id="wr-savestatus"></span>
    </div>
    <!-- meta fields -->
    <div class="wr-meta">
      <input class="wr-title-inp" id="edit-title-input" placeholder="Post title">
      <div class="wr-mf"><label>slug</label><input id="edit-slug" placeholder="my-post-slug"></div>
      <div class="wr-mf"><label>excerpt</label><input id="edit-excerpt" placeholder="Short summary"></div>
      <div class="wr-mf"><label>thumbnail</label><input id="edit-thumbnail" type="url" placeholder="https://res.cloudinary.com/..."><button class="wr-t" id="wr-thumb-btn" title="Pick from Cloudinary">☁</button></div>
    </div>
    <!-- toolbar -->
    <div class="wr-toolbar">
      <button class="wr-t" data-md="bold" title="Bold">B</button>
      <button class="wr-t wr-italic" data-md="italic" title="Italic">I</button>
      <button class="wr-t" data-md="h2">H2</button>
      <button class="wr-t" data-md="h3">H3</button>
      <span class="wr-div">|</span>
      <button class="wr-t" data-md="quote" title="Blockquote">"</button>
      <button class="wr-t" data-md="code" title="Code">`</button>
      <button class="wr-t" data-md="hr" title="Divider">—</button>
      <span class="wr-div">|</span>
      <button class="wr-t" data-md="link" title="Link">link</button>
      <button class="wr-t" id="wr-img-btn" title="Insert image">img</button>
      <span class="wr-div">|</span>
      <button class="wr-t" id="wr-export-md" title="Download .md">md↓</button>
      <button class="wr-t" id="wr-export-pdf" title="Print to PDF">pdf</button>
      <span class="wr-div">|</span>
      <span class="wr-div">font</span>
      <button class="wr-t" data-ff="sans">sans</button>
      <button class="wr-t" data-ff="mono">mono</button>
      <button class="wr-t" data-ff="serif">serif</button>
      <span class="wr-sp"></span>
      <label class="wr-pub" id="wr-pub-wrap">
        <input type="checkbox" id="edit-published"> <span id="wr-pub-lbl">draft</span>
      </label>
      <button class="wr-t wr-save-btn" id="wr-save-btn">save</button>
    </div>
    <!-- editor -->
    <div class="wr-body">
      <textarea class="wr-editor" id="edit-content" placeholder="start writing... (markdown supported)"></textarea>
    </div>
    <!-- status bar -->
    <div class="wr-statusbar">
      <span id="wr-wc">0 words</span>
      <div class="wr-gbar">
        <div class="wr-gtrack"><div class="wr-gfill" id="wr-gfill" style="width:0%"></div></div>
        <span id="wr-glabel"></span>
      </div>
      <span class="wr-sp"></span>
      <span id="wr-autosave"></span>
      <button class="wr-t" id="wr-goal-set" style="color:rgba(255,255,255,0.2);font-size:0.62rem">goal</button>
    </div>
    <!-- image insert dialog -->
    <div class="wr-modal hidden" id="wr-modal">
      <div class="wr-modal-box">
        <h3>insert image</h3>
        <input type="url" id="wr-img-url" placeholder="https://res.cloudinary.com/...">
        <input type="text" id="wr-img-alt" placeholder="alt text (optional)">
        <div class="wr-modal-acts">
          <button class="wr-mbtn-cancel" id="wr-modal-cancel">cancel</button>
          <button class="wr-mbtn-ok" id="wr-modal-ok">insert</button>
        </div>
      </div>
    </div>
    <input type="hidden" id="edit-id">
    <p id="edit-error" class="error" style="display:none;position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);background:#1a1916;padding:.5rem 1rem;border-radius:6px;border:1px solid #f87171;"></p>
  </div>

  <div id="edit-project-view">
    <h1 id="edit-project-title">New project</h1>
    <p id="edit-project-error" class="error" style="display:none"></p>
    <form id="edit-project-form">
      <input type="hidden" id="edit-project-id">
      <label for="edit-project-slug">Slug</label>
      <input type="text" id="edit-project-slug" name="slug" required placeholder="my-project">
      <label for="edit-project-title-input">Title</label>
      <input type="text" id="edit-project-title-input" name="title" required placeholder="Project title">
      <label for="edit-project-excerpt">Excerpt (for list card)</label>
      <textarea id="edit-project-excerpt" name="excerpt" placeholder="Short description"></textarea>
      <label for="edit-project-hero-image">Hero image URL</label>
      <input type="url" id="edit-project-hero-image" name="hero_image" placeholder="https://...">
      <label for="edit-project-hero-video">Hero video URL (optional; overrides image if set)</label>
      <input type="url" id="edit-project-hero-video" name="hero_video" placeholder="https://...mp4">
      <label for="edit-project-about">About text (hero section)</label>
      <textarea id="edit-project-about" name="about_text" placeholder="Longer description for hero"></textarea>
      <label for="edit-project-gallery">Gallery media URLs (one per line; images or .mp4/.webm video)</label>
      <textarea id="edit-project-gallery" name="gallery_images" placeholder="https://...jpg\nhttps://...mp4"></textarea>
      <label for="edit-project-gallery-caption">Gallery caption</label>
      <textarea id="edit-project-gallery-caption" name="gallery_caption" placeholder="Caption below gallery"></textarea>
      <label for="edit-project-footer-cta">Footer CTA text</label>
      <input type="text" id="edit-project-footer-cta" name="footer_cta" placeholder="Get in touch">
      <label for="edit-project-footer-email">Footer email</label>
      <input type="email" id="edit-project-footer-email" name="footer_email" placeholder="you@example.com">
      <label for="edit-project-tags">Tags (comma-separated)</label>
      <input type="text" id="edit-project-tags" name="tags" placeholder="Design, Strategy">
      <div class="checkbox-wrap">
        <input type="checkbox" id="edit-project-published" name="published">
        <label for="edit-project-published">Published</label>
      </div>
      <button type="submit" class="btn-primary">Save</button>
      <button type="button" class="btn-secondary" id="edit-project-cancel">Cancel</button>
    </form>
  </div>

  <script>
    const API = window.location.origin;
    let token = sessionStorage.getItem("cms_token");

    function apiHeaders() {
      const h = { "Content-Type": "application/json" };
      if (token) h["Authorization"] = "Bearer " + token;
      return h;
    }

    function showView(name) {
      document.querySelectorAll("#login-view, #posts-view, #projects-view, #edit-view, #edit-project-view, #dots-view, #edit-dot-view").forEach((v) => v.classList.remove("active"));
      document.getElementById(name + "-view").classList.add("active");
      document.body.classList.toggle("writing", name === "edit");
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg || "";
      el.style.display = msg ? "block" : "none";
    }

    function showSuccess(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg || "";
      el.style.display = msg ? "block" : "none";
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s || "";
      return div.innerHTML;
    }

    document.querySelectorAll(".tabs button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        if (btn.dataset.tab === "posts") { showView("posts"); loadPosts(); }
        else if (btn.dataset.tab === "projects") { showView("projects"); loadProjects(); }
        else if (btn.dataset.tab === "dots") { showView("dots"); loadDots(); }
      });
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      showError("login-error");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        const r = await fetch(API + "/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await r.json();
        if (data.error) {
          showError("login-error", data.error);
          return;
        }
        token = data.token;
        sessionStorage.setItem("cms_token", token);
        showView("posts");
        loadPosts();
      } catch (err) {
        showError("login-error", "Request failed.");
      }
    });

    document.getElementById("logout").addEventListener("click", () => {
      token = null;
      sessionStorage.removeItem("cms_token");
      showView("login");
    });
    document.getElementById("logout-projects").addEventListener("click", () => {
      token = null;
      sessionStorage.removeItem("cms_token");
      showView("login");
    });

    async function loadPosts() {
      showError("posts-error");
      showSuccess("posts-success");
      try {
        const r = await fetch(API + "/api/admin/posts", { headers: apiHeaders() });
        const data = await r.json();
        if (data.error) {
          if (r.status === 401) {
            token = null;
            sessionStorage.removeItem("cms_token");
            showView("login");
            return;
          }
          showError("posts-error", data.error);
          return;
        }
        const list = document.getElementById("post-list");
        list.innerHTML = (data.posts || []).map(
          (p) => `
          <li>
            <span>
              <strong>${escapeHtml(p.title)}</strong>
              <span class="slug">/${escapeHtml(p.slug)}</span>
              <span class="published ${p.published ? "yes" : "no"}">${p.published ? "Published" : "Draft"}</span>
            </span>
            <span class="actions">
              <button type="button" class="btn-secondary" data-edit="${p.id}">Edit</button>
              <button type="button" class="btn-danger" data-delete="${p.id}">Delete</button>
            </span>
          </li>
        `
        ).join("");
        list.querySelectorAll("[data-edit]").forEach((btn) => {
          btn.addEventListener("click", () => editPost(btn.dataset.edit));
        });
        list.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.addEventListener("click", () => deletePost(btn.dataset.delete));
        });
      } catch (err) {
        showError("posts-error", "Request failed.");
      }
    }

    async function loadProjects() {
      showError("projects-error");
      showSuccess("projects-success");
      try {
        const r = await fetch(API + "/api/admin/projects", { headers: apiHeaders() });
        const data = await r.json();
        if (data.error) {
          if (r.status === 401) {
            token = null;
            sessionStorage.removeItem("cms_token");
            showView("login");
            return;
          }
          showError("projects-error", data.error);
          return;
        }
        const list = document.getElementById("project-list");
        list.innerHTML = (data.projects || []).map(
          (p) => `
          <li>
            <span>
              <strong>${escapeHtml(p.title)}</strong>
              <span class="slug">/${escapeHtml(p.slug)}</span>
              <span class="published ${p.published ? "yes" : "no"}">${p.published ? "Published" : "Draft"}</span>
            </span>
            <span class="actions">
              <button type="button" class="btn-secondary" data-edit="${p.id}">Edit</button>
              <button type="button" class="btn-danger" data-delete="${p.id}">Delete</button>
            </span>
          </li>
        `
        ).join("");
        list.querySelectorAll("[data-edit]").forEach((btn) => {
          btn.addEventListener("click", () => editProject(btn.dataset.edit));
        });
        list.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.addEventListener("click", () => deleteProject(btn.dataset.delete));
        });
      } catch (err) {
        showError("projects-error", "Request failed.");
      }
    }

    document.getElementById("new-post").addEventListener("click", () => {
      wrOpenPost(null);
    });

    document.getElementById("new-project").addEventListener("click", () => {
      document.getElementById("edit-project-id").value = "";
      document.getElementById("edit-project-slug").value = "";
      document.getElementById("edit-project-title-input").value = "";
      document.getElementById("edit-project-excerpt").value = "";
      document.getElementById("edit-project-hero-image").value = "";
      document.getElementById("edit-project-hero-video").value = "";
      document.getElementById("edit-project-about").value = "";
      document.getElementById("edit-project-gallery").value = "";
      document.getElementById("edit-project-gallery-caption").value = "";
      document.getElementById("edit-project-footer-cta").value = "";
      document.getElementById("edit-project-footer-email").value = "";
      document.getElementById("edit-project-tags").value = "";
      document.getElementById("edit-project-published").checked = false;
      document.getElementById("edit-project-title").textContent = "New project";
      showError("edit-project-error");
      showView("edit-project");
    });

    async function editPost(id) {
      try {
        const r = await fetch(API + "/api/admin/posts/" + id, { headers: apiHeaders() });
        const data = await r.json();
        if (!data.post) { showError("posts-error", data.error || "Post not found."); return; }
        wrOpenPost(data.post);
      } catch {
        showError("posts-error", "Request failed.");
      }
    }

    async function editProject(id) {
      try {
        const r = await fetch(API + "/api/admin/projects/" + id, { headers: apiHeaders() });
        const data = await r.json();
        const p = data.project;
        if (!p) {
          showError("edit-project-error", data.error || "Project not found.");
          return;
        }
        document.getElementById("edit-project-id").value = p.id;
        document.getElementById("edit-project-slug").value = p.slug;
        document.getElementById("edit-project-title-input").value = p.title;
        document.getElementById("edit-project-excerpt").value = p.excerpt || "";
        document.getElementById("edit-project-hero-image").value = p.hero_image || "";
        document.getElementById("edit-project-hero-video").value = p.hero_video || "";
        document.getElementById("edit-project-about").value = p.about_text || "";
        document.getElementById("edit-project-gallery").value = (p.galleryImages || []).join("\n");
        document.getElementById("edit-project-gallery-caption").value = p.gallery_caption || "";
        document.getElementById("edit-project-footer-cta").value = p.footer_cta || "";
        document.getElementById("edit-project-footer-email").value = p.footer_email || "";
        document.getElementById("edit-project-tags").value = (p.tags || []).join(", ");
        document.getElementById("edit-project-published").checked = !!p.published;
        document.getElementById("edit-project-title").textContent = "Edit project";
        showError("edit-project-error");
        showView("edit-project");
      } catch (err) {
        showError("edit-project-error", "Request failed.");
      }
    }

    async function deletePost(id) {
      if (!confirm("Delete this post?")) return;
      try {
        const r = await fetch(API + "/api/admin/posts/" + id, { method: "DELETE", headers: apiHeaders() });
        const data = await r.json();
        if (data.error) {
          showError("posts-error", data.error);
          return;
        }
        showSuccess("posts-success", "Post deleted.");
        loadPosts();
      } catch (err) {
        showError("posts-error", "Request failed.");
      }
    }

    async function deleteProject(id) {
      if (!confirm("Delete this project?")) return;
      try {
        const r = await fetch(API + "/api/admin/projects/" + id, { method: "DELETE", headers: apiHeaders() });
        const data = await r.json();
        if (data.error) {
          showError("projects-error", data.error);
          return;
        }
        showSuccess("projects-success", "Project deleted.");
        loadProjects();
      } catch (err) {
        showError("projects-error", "Request failed.");
      }
    }

    // ── Writer ────────────────────────────────────────────────────────────
    const WR_GOAL_KEY = "wr_word_goal";
    let wrAutoSaveTimer = null;
    let wrLastSaved = null;

    function wrOpenPost(post) {
      const id = post ? post.id : "";
      document.getElementById("edit-id").value = id;
      document.getElementById("edit-slug").value = post ? post.slug : "";
      document.getElementById("edit-title-input").value = post ? post.title : "";
      document.getElementById("edit-excerpt").value = post ? (post.excerpt || "") : "";
      document.getElementById("edit-thumbnail").value = post ? (post.thumbnail || "") : "";
      document.getElementById("edit-content").value = post ? (post.content || "") : "";
      document.getElementById("edit-published").checked = post ? !!post.published : false;
      document.getElementById("wr-filename").textContent = post ? post.slug + ".md" : "untitled.md";
      wrUpdatePubLabel();
      wrUpdateWordCount();
      wrSetStatus("");
      showError("edit-error");
      showView("edit");
      setTimeout(() => document.getElementById("edit-content").focus(), 60);
    }

    async function wrSave(isAuto) {
      const id = document.getElementById("edit-id").value;
      const slug = document.getElementById("edit-slug").value.trim();
      const title = document.getElementById("edit-title-input").value.trim();
      if (!slug || !title) {
        if (!isAuto) showError("edit-error", "Slug and title are required.");
        return;
      }
      wrSetStatus("saving", "saving…");
      const body = {
        slug, title,
        excerpt: document.getElementById("edit-excerpt").value.trim(),
        content: document.getElementById("edit-content").value.trim(),
        thumbnail: document.getElementById("edit-thumbnail").value.trim() || null,
        published: document.getElementById("edit-published").checked,
      };
      try {
        const url = id ? API + "/api/admin/posts/" + id : API + "/api/admin/posts";
        const method = id ? "PUT" : "POST";
        const r = await fetch(url, { method, headers: apiHeaders(), body: JSON.stringify(body) });
        const data = await r.json();
        if (data.error) { wrSetStatus("error", data.error); showError("edit-error", data.error); return; }
        if (!id && data.post) document.getElementById("edit-id").value = data.post.id;
        if (data.post) document.getElementById("wr-filename").textContent = data.post.slug + ".md";
        wrLastSaved = new Date();
        wrSetStatus("", "saved");
        setTimeout(() => wrSetStatus(""), 2000);
        showError("edit-error");
      } catch {
        wrSetStatus("error", "save failed");
      }
    }

    function wrSetStatus(cls, text) {
      const el = document.getElementById("wr-savestatus");
      el.className = "wr-savestatus" + (cls ? " " + cls : "");
      el.textContent = text || "";
    }

    function wrUpdateWordCount() {
      const text = document.getElementById("edit-content").value;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById("wr-wc").textContent = words + " word" + (words !== 1 ? "s" : "");
      const goal = parseInt(localStorage.getItem(WR_GOAL_KEY) || "500", 10);
      const pct = goal > 0 ? Math.min(100, Math.round(words / goal * 100)) : 0;
      const fill = document.getElementById("wr-gfill");
      fill.style.width = pct + "%";
      fill.className = "wr-gfill" + (pct >= 100 ? " done" : "");
      document.getElementById("wr-glabel").textContent = goal > 0 ? pct + "%" : "";
    }

    function wrUpdatePubLabel() {
      const pub = document.getElementById("edit-published").checked;
      const lbl = document.getElementById("wr-pub-lbl");
      const wrap = document.getElementById("wr-pub-wrap");
      lbl.textContent = pub ? "live" : "draft";
      wrap.className = "wr-pub" + (pub ? " live" : "");
    }

    function wrInsert(before, after, placeholder) {
      const ta = document.getElementById("edit-content");
      const s = ta.selectionStart, e = ta.selectionEnd;
      const sel = ta.value.slice(s, e) || placeholder || "";
      ta.setRangeText(before + sel + after, s, e, "end");
      if (!ta.value.slice(s, e) && placeholder) {
        ta.setSelectionRange(s + before.length, s + before.length + placeholder.length);
      }
      ta.focus();
      wrUpdateWordCount();
    }

    const MD_ACTIONS = {
      bold: () => wrInsert("**", "**", "bold text"),
      italic: () => wrInsert("*", "*", "italic text"),
      h2: () => wrInsert("\n## ", "", "Heading"),
      h3: () => wrInsert("\n### ", "", "Heading"),
      quote: () => wrInsert("\n> ", "", "quote"),
      code: () => wrInsert("`", "`", "code"),
      hr: () => wrInsert("\n\n---\n\n", ""),
      link: () => wrInsert("[", "](https://)", "link text"),
    };

    document.querySelectorAll(".wr-t[data-md]").forEach(btn => {
      btn.addEventListener("click", () => MD_ACTIONS[btn.dataset.md]?.());
    });

    document.querySelectorAll(".wr-t[data-ff]").forEach(btn => {
      btn.addEventListener("click", () => {
        const map = { sans: "ui-sans-serif,system-ui,sans-serif", mono: "ui-monospace,monospace", serif: "Georgia,serif" };
        document.getElementById("edit-content").style.fontFamily = map[btn.dataset.ff] || "";
      });
    });

    document.getElementById("edit-content").addEventListener("input", () => {
      wrUpdateWordCount();
      clearTimeout(wrAutoSaveTimer);
      wrSetStatus("saving", "…");
      wrAutoSaveTimer = setTimeout(() => wrSave(true), 2000);
    });

    document.getElementById("edit-published").addEventListener("change", wrUpdatePubLabel);

    document.getElementById("wr-save-btn").addEventListener("click", () => wrSave(false));

    document.getElementById("wr-back").addEventListener("click", () => {
      clearTimeout(wrAutoSaveTimer);
      showView("posts");
      loadPosts();
    });

    document.getElementById("wr-export-md").addEventListener("click", () => {
      const title = document.getElementById("edit-title-input").value || "post";
      const content = document.getElementById("edit-content").value;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([content], { type: "text/markdown" }));
      a.download = title.toLowerCase().replace(/\s+/g, "-") + ".md";
      a.click();
    });

    document.getElementById("wr-export-pdf").addEventListener("click", () => window.print());

    document.getElementById("wr-goal-set").addEventListener("click", () => {
      const cur = localStorage.getItem(WR_GOAL_KEY) || "500";
      const val = prompt("Word count goal (0 to disable):", cur);
      if (val !== null) { localStorage.setItem(WR_GOAL_KEY, parseInt(val, 10) || 0); wrUpdateWordCount(); }
    });

    // Image dialog
    document.getElementById("wr-img-btn").addEventListener("click", () => {
      document.getElementById("wr-img-url").value = "";
      document.getElementById("wr-img-alt").value = "";
      document.getElementById("wr-modal").classList.remove("hidden");
      document.getElementById("wr-img-url").focus();
    });
    document.getElementById("wr-modal-cancel").addEventListener("click", () => document.getElementById("wr-modal").classList.add("hidden"));
    document.getElementById("wr-modal-ok").addEventListener("click", () => {
      const url = document.getElementById("wr-img-url").value.trim();
      if (!url) return;
      const alt = document.getElementById("wr-img-alt").value.trim();
      wrInsert(`![${alt}](${url})`, "");
      document.getElementById("wr-modal").classList.add("hidden");
    });
    document.getElementById("wr-modal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("wr-modal")) document.getElementById("wr-modal").classList.add("hidden");
    });

    // Cloudinary pick (thumbnail field)
    document.getElementById("wr-thumb-btn").addEventListener("click", () => {
      const cloudName = window.CLOUDINARY_CLOUD_NAME;
      if (cloudName && window.cloudinary) {
        window.cloudinary.createUploadWidget({ cloudName, uploadPreset: window.CLOUDINARY_UPLOAD_PRESET || "unsigned" }, (err, result) => {
          if (!err && result?.event === "success") document.getElementById("edit-thumbnail").value = result.info.secure_url;
        }).open();
      } else {
        const url = prompt("Paste Cloudinary URL:");
        if (url) document.getElementById("edit-thumbnail").value = url;
      }
    });

    // Ctrl+S to save
    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "s" && document.body.classList.contains("writing")) {
        e.preventDefault();
        clearTimeout(wrAutoSaveTimer);
        wrSave(false);
      }
    });

    document.getElementById("edit-project-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      showError("edit-project-error");
      const id = document.getElementById("edit-project-id").value;
      const galleryStr = document.getElementById("edit-project-gallery").value.trim();
      const galleryImages = galleryStr ? galleryStr.split("\n").map((s) => s.trim()).filter(Boolean) : [];
      const tagsStr = document.getElementById("edit-project-tags").value.trim();
      const tags = tagsStr ? tagsStr.split(",").map((s) => s.trim()).filter(Boolean) : [];
      const body = {
        slug: document.getElementById("edit-project-slug").value.trim(),
        title: document.getElementById("edit-project-title-input").value.trim(),
        excerpt: document.getElementById("edit-project-excerpt").value.trim(),
        hero_image: document.getElementById("edit-project-hero-image").value.trim() || null,
        hero_video: document.getElementById("edit-project-hero-video").value.trim() || null,
        about_text: document.getElementById("edit-project-about").value.trim() || null,
        galleryImages,
        gallery_caption: document.getElementById("edit-project-gallery-caption").value.trim() || null,
        footer_cta: document.getElementById("edit-project-footer-cta").value.trim() || null,
        footer_email: document.getElementById("edit-project-footer-email").value.trim() || null,
        tags,
        published: document.getElementById("edit-project-published").checked,
      };
      try {
        const url = id ? API + "/api/admin/projects/" + id : API + "/api/admin/projects";
        const method = id ? "PUT" : "POST";
        const r = await fetch(url, { method, headers: apiHeaders(), body: JSON.stringify(body) });
        const data = await r.json();
        if (data.error) {
          showError("edit-project-error", data.error);
          return;
        }
        showView("projects");
        showSuccess("projects-success", id ? "Project updated." : "Project created.");
        loadProjects();
      } catch (err) {
        showError("edit-project-error", "Request failed.");
      }
    });

    document.getElementById("edit-project-cancel").addEventListener("click", () => showView("projects"));
    document.getElementById("edit-dot-cancel").addEventListener("click", () => showView("dots"));

    document.getElementById("logout-dots").addEventListener("click", () => {
      token = null; sessionStorage.removeItem("cms_token"); showView("login");
    });

    // ── Globe Dots ────────────────────────────────────────────────────────────
    async function loadDots() {
      showError("dots-error"); showSuccess("dots-success");
      try {
        const r = await fetch(API + "/api/career-dots");
        const data = await r.json();
        if (data.error) { showError("dots-error", data.error); return; }
        const list = document.getElementById("dot-list");
        list.innerHTML = (data.dots || []).map((d) => `
          <li>
            <div class="dot-info">
              <div class="dot-label">${escapeHtml(d.label)}</div>
              <div class="dot-meta">${escapeHtml(d.year || "")}${d.year && d.text ? " · " : ""}${escapeHtml((d.text || "").slice(0, 60))}${(d.text || "").length > 60 ? "…" : ""}</div>
              <div class="coord">${d.lat}, ${d.lng} · order ${d.sort_order}</div>
            </div>
            <span class="actions">
              <button type="button" class="btn-secondary" data-dot-edit="${d.id}">Edit</button>
              <button type="button" class="btn-danger" data-dot-delete="${d.id}">Delete</button>
            </span>
          </li>
        `).join("");
        list.querySelectorAll("[data-dot-edit]").forEach((btn) => btn.addEventListener("click", () => openEditDot(btn.dataset.dotEdit, data.dots)));
        list.querySelectorAll("[data-dot-delete]").forEach((btn) => btn.addEventListener("click", () => deleteDot(btn.dataset.dotDelete)));
      } catch { showError("dots-error", "Request failed."); }
    }

    function openEditDot(id, dots) {
      const d = dots ? dots.find((x) => String(x.id) === String(id)) : null;
      document.getElementById("edit-dot-id").value = d ? d.id : "";
      document.getElementById("edit-dot-label").value = d ? d.label : "";
      document.getElementById("edit-dot-lat").value = d ? d.lat : "";
      document.getElementById("edit-dot-lng").value = d ? d.lng : "";
      document.getElementById("edit-dot-year").value = d ? (d.year || "") : "";
      document.getElementById("edit-dot-text").value = d ? (d.text || "") : "";
      document.getElementById("edit-dot-order").value = d ? d.sort_order : 0;
      document.getElementById("edit-dot-title").textContent = d ? "Edit dot" : "New dot";
      showError("edit-dot-error");
      showView("edit-dot");
    }

    document.getElementById("new-dot").addEventListener("click", () => openEditDot(null, null));

    document.getElementById("edit-dot-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      showError("edit-dot-error");
      const id = document.getElementById("edit-dot-id").value;
      const body = {
        label:      document.getElementById("edit-dot-label").value.trim(),
        lat:        parseFloat(document.getElementById("edit-dot-lat").value),
        lng:        parseFloat(document.getElementById("edit-dot-lng").value),
        year:       document.getElementById("edit-dot-year").value.trim(),
        text:       document.getElementById("edit-dot-text").value.trim(),
        sort_order: parseInt(document.getElementById("edit-dot-order").value, 10) || 0,
      };
      if (!body.label || isNaN(body.lat) || isNaN(body.lng)) {
        showError("edit-dot-error", "Label, lat, and lng are required."); return;
      }
      try {
        const url    = id ? API + "/api/admin/career-dots/" + id : API + "/api/admin/career-dots";
        const method = id ? "PUT" : "POST";
        const r = await fetch(url, { method, headers: apiHeaders(), body: JSON.stringify(body) });
        const data = await r.json();
        if (data.error) { showError("edit-dot-error", data.error); return; }
        showView("dots");
        showSuccess("dots-success", id ? "Dot updated." : "Dot added.");
        loadDots();
      } catch { showError("edit-dot-error", "Request failed."); }
    });

    async function deleteDot(id) {
      if (!confirm("Delete this dot?")) return;
      try {
        const r = await fetch(API + "/api/admin/career-dots/" + id, { method: "DELETE", headers: apiHeaders() });
        const data = await r.json();
        if (data.error) { showError("dots-error", data.error); return; }
        showSuccess("dots-success", "Dot deleted.");
        loadDots();
      } catch { showError("dots-error", "Request failed."); }
    }

    if (token) {
      showView("posts");
      loadPosts();
    } else {
      showView("login");
    }
  </script>
</body>
</html>
