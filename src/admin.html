<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CMS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #e5e5e5; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.125rem; margin: 1.5rem 0 0.75rem; }
    form { max-width: 36rem; }
    label { display: block; font-size: 0.875rem; margin-bottom: 0.25rem; color: #a3a3a3; }
    input, textarea { width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 1rem; border: 1px solid #404040; border-radius: 6px; background: #262626; color: #e5e5e5; font-size: 1rem; }
    textarea { min-height: 6rem; resize: vertical; }
    button { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: none; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #404040; color: #e5e5e5; margin-left: 0.5rem; }
    .btn-danger { background: #dc2626; color: white; }
    .error { color: #f87171; font-size: 0.875rem; margin-bottom: 1rem; }
    .success { color: #4ade80; font-size: 0.875rem; margin-bottom: 1rem; }
    #login-view, #posts-view, #projects-view, #edit-view, #edit-project-view, #dots-view, #edit-dot-view { display: none; }
    #login-view.active, #posts-view.active, #projects-view.active, #edit-view.active, #edit-project-view.active, #dots-view.active, #edit-dot-view.active { display: block; }
    .dot-list { list-style: none; }
    .dot-list li { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; border: 1px solid #404040; border-radius: 6px; margin-bottom: 0.5rem; background: #262626; gap: 1rem; }
    .dot-list li .dot-info { flex: 1; }
    .dot-list li .dot-label { font-weight: 600; }
    .dot-list li .dot-meta { font-size: 0.75rem; color: #737373; margin-top: 0.15rem; }
    .coord { font-size: 0.75rem; color: #737373; font-family: monospace; }
    .post-list, .project-list { list-style: none; }
    .post-list li, .project-list li { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; border: 1px solid #404040; border-radius: 6px; margin-bottom: 0.5rem; background: #262626; }
    .post-list li span, .project-list li span { flex: 1; }
    .slug { font-size: 0.75rem; color: #737373; }
    .published { font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 4px; }
    .published.yes { background: #166534; color: #86efac; }
    .published.no { background: #422006; color: #fcd34d; }
    .actions { display: flex; gap: 0.5rem; }
    .checkbox-wrap { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .checkbox-wrap input { width: auto; margin: 0; }
    .logout { font-size: 0.875rem; color: #737373; cursor: pointer; margin-left: 1rem; }
    .logout:hover { color: #a3a3a3; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tabs button { padding: 0.5rem 1rem; background: #404040; color: #e5e5e5; }
    .tabs button.active { background: #3b82f6; color: white; }
    .help { font-size: 0.75rem; color: #737373; margin-top: -0.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div id="login-view" class="active">
    <h1>Admin Login</h1>
    <p id="login-error" class="error" style="display:none"></p>
    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
      <button type="submit" class="btn-primary">Sign in</button>
    </form>
  </div>

  <div id="posts-view">
    <h1>Posts <span class="logout" id="logout">Sign out</span></h1>
    <div class="tabs">
      <button type="button" class="active" data-tab="posts">Posts</button>
      <button type="button" data-tab="projects">Projects</button>
      <button type="button" data-tab="dots">Globe Dots</button>
    </div>
    <p id="posts-error" class="error" style="display:none"></p>
    <p id="posts-success" class="success" style="display:none"></p>
    <button type="button" class="btn-primary" id="new-post">New post</button>
    <h2>All posts</h2>
    <ul id="post-list" class="post-list"></ul>
  </div>

  <div id="projects-view">
    <h1>Projects <span class="logout" id="logout-projects">Sign out</span></h1>
    <div class="tabs">
      <button type="button" data-tab="posts">Posts</button>
      <button type="button" class="active" data-tab="projects">Projects</button>
      <button type="button" data-tab="dots">Globe Dots</button>
    </div>
    <p id="projects-error" class="error" style="display:none"></p>
    <p id="projects-success" class="success" style="display:none"></p>
    <button type="button" class="btn-primary" id="new-project">New project</button>
    <h2>All projects</h2>
    <ul id="project-list" class="project-list"></ul>
  </div>

  <div id="dots-view">
    <h1>Globe Dots <span class="logout" id="logout-dots">Sign out</span></h1>
    <div class="tabs">
      <button type="button" data-tab="posts">Posts</button>
      <button type="button" data-tab="projects">Projects</button>
      <button type="button" class="active" data-tab="dots">Globe Dots</button>
    </div>
    <p id="dots-error" class="error" style="display:none"></p>
    <p id="dots-success" class="success" style="display:none"></p>
    <button type="button" class="btn-primary" id="new-dot">Add dot</button>
    <h2>All dots</h2>
    <ul id="dot-list" class="dot-list"></ul>
  </div>

  <div id="edit-dot-view">
    <h1 id="edit-dot-title">New dot</h1>
    <p id="edit-dot-error" class="error" style="display:none"></p>
    <form id="edit-dot-form">
      <input type="hidden" id="edit-dot-id">
      <label for="edit-dot-label">Label (city name)</label>
      <input type="text" id="edit-dot-label" required placeholder="New York, NY">
      <label for="edit-dot-lat">Latitude</label>
      <input type="number" id="edit-dot-lat" required step="any" placeholder="40.7128">
      <label for="edit-dot-lng">Longitude</label>
      <input type="number" id="edit-dot-lng" required step="any" placeholder="-74.0060">
      <p class="help">Tip: find lat/lng at <a href="https://www.latlong.net" target="_blank" style="color:#3b82f6">latlong.net</a></p>
      <label for="edit-dot-year">Year / period</label>
      <input type="text" id="edit-dot-year" placeholder="2019–2021">
      <label for="edit-dot-text">Tooltip text</label>
      <textarea id="edit-dot-text" placeholder="What happened here?"></textarea>
      <label for="edit-dot-order">Sort order</label>
      <input type="number" id="edit-dot-order" value="0" step="1">
      <button type="submit" class="btn-primary">Save</button>
      <button type="button" class="btn-secondary" id="edit-dot-cancel">Cancel</button>
    </form>
  </div>

  <div id="edit-view">
    <h1 id="edit-title">New post</h1>
    <p id="edit-error" class="error" style="display:none"></p>
    <form id="edit-form">
      <input type="hidden" id="edit-id">
      <label for="edit-slug">Slug</label>
      <input type="text" id="edit-slug" name="slug" required placeholder="my-post-slug">
      <label for="edit-title-input">Title</label>
      <input type="text" id="edit-title-input" name="title" required placeholder="Post title">
      <label for="edit-excerpt">Excerpt</label>
      <textarea id="edit-excerpt" name="excerpt" placeholder="Short summary"></textarea>
      <label for="edit-content">Content</label>
      <textarea id="edit-content" name="content" placeholder="Full content (HTML supported)"></textarea>
      <div class="checkbox-wrap">
        <input type="checkbox" id="edit-published" name="published">
        <label for="edit-published">Published</label>
      </div>
      <button type="submit" class="btn-primary">Save</button>
      <button type="button" class="btn-secondary" id="edit-cancel">Cancel</button>
    </form>
  </div>

  <div id="edit-project-view">
    <h1 id="edit-project-title">New project</h1>
    <p id="edit-project-error" class="error" style="display:none"></p>
    <form id="edit-project-form">
      <input type="hidden" id="edit-project-id">
      <label for="edit-project-slug">Slug</label>
      <input type="text" id="edit-project-slug" name="slug" required placeholder="my-project">
      <label for="edit-project-title-input">Title</label>
      <input type="text" id="edit-project-title-input" name="title" required placeholder="Project title">
      <label for="edit-project-excerpt">Excerpt (for list card)</label>
      <textarea id="edit-project-excerpt" name="excerpt" placeholder="Short description"></textarea>
      <label for="edit-project-hero-image">Hero image URL</label>
      <input type="url" id="edit-project-hero-image" name="hero_image" placeholder="https://...">
      <label for="edit-project-hero-video">Hero video URL (optional; overrides image if set)</label>
      <input type="url" id="edit-project-hero-video" name="hero_video" placeholder="https://...mp4">
      <label for="edit-project-about">About text (hero section)</label>
      <textarea id="edit-project-about" name="about_text" placeholder="Longer description for hero"></textarea>
      <label for="edit-project-gallery">Gallery media URLs (one per line; images or .mp4/.webm video)</label>
      <textarea id="edit-project-gallery" name="gallery_images" placeholder="https://...jpg\nhttps://...mp4"></textarea>
      <label for="edit-project-gallery-caption">Gallery caption</label>
      <textarea id="edit-project-gallery-caption" name="gallery_caption" placeholder="Caption below gallery"></textarea>
      <label for="edit-project-footer-cta">Footer CTA text</label>
      <input type="text" id="edit-project-footer-cta" name="footer_cta" placeholder="Get in touch">
      <label for="edit-project-footer-email">Footer email</label>
      <input type="email" id="edit-project-footer-email" name="footer_email" placeholder="you@example.com">
      <label for="edit-project-tags">Tags (comma-separated)</label>
      <input type="text" id="edit-project-tags" name="tags" placeholder="Design, Strategy">
      <div class="checkbox-wrap">
        <input type="checkbox" id="edit-project-published" name="published">
        <label for="edit-project-published">Published</label>
      </div>
      <button type="submit" class="btn-primary">Save</button>
      <button type="button" class="btn-secondary" id="edit-project-cancel">Cancel</button>
    </form>
  </div>

  <script>
    const API = window.location.origin;
    let token = sessionStorage.getItem("cms_token");

    function apiHeaders() {
      const h = { "Content-Type": "application/json" };
      if (token) h["Authorization"] = "Bearer " + token;
      return h;
    }

    function showView(name) {
      document.querySelectorAll("#login-view, #posts-view, #projects-view, #edit-view, #edit-project-view, #dots-view, #edit-dot-view").forEach((v) => v.classList.remove("active"));
      document.getElementById(name + "-view").classList.add("active");
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg || "";
      el.style.display = msg ? "block" : "none";
    }

    function showSuccess(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg || "";
      el.style.display = msg ? "block" : "none";
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s || "";
      return div.innerHTML;
    }

    document.querySelectorAll(".tabs button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        if (btn.dataset.tab === "posts") { showView("posts"); loadPosts(); }
        else if (btn.dataset.tab === "projects") { showView("projects"); loadProjects(); }
        else if (btn.dataset.tab === "dots") { showView("dots"); loadDots(); }
      });
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      showError("login-error");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        const r = await fetch(API + "/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await r.json();
        if (data.error) {
          showError("login-error", data.error);
          return;
        }
        token = data.token;
        sessionStorage.setItem("cms_token", token);
        showView("posts");
        loadPosts();
      } catch (err) {
        showError("login-error", "Request failed.");
      }
    });

    document.getElementById("logout").addEventListener("click", () => {
      token = null;
      sessionStorage.removeItem("cms_token");
      showView("login");
    });
    document.getElementById("logout-projects").addEventListener("click", () => {
      token = null;
      sessionStorage.removeItem("cms_token");
      showView("login");
    });

    async function loadPosts() {
      showError("posts-error");
      showSuccess("posts-success");
      try {
        const r = await fetch(API + "/api/admin/posts", { headers: apiHeaders() });
        const data = await r.json();
        if (data.error) {
          if (r.status === 401) {
            token = null;
            sessionStorage.removeItem("cms_token");
            showView("login");
            return;
          }
          showError("posts-error", data.error);
          return;
        }
        const list = document.getElementById("post-list");
        list.innerHTML = (data.posts || []).map(
          (p) => `
          <li>
            <span>
              <strong>${escapeHtml(p.title)}</strong>
              <span class="slug">/${escapeHtml(p.slug)}</span>
              <span class="published ${p.published ? "yes" : "no"}">${p.published ? "Published" : "Draft"}</span>
            </span>
            <span class="actions">
              <button type="button" class="btn-secondary" data-edit="${p.id}">Edit</button>
              <button type="button" class="btn-danger" data-delete="${p.id}">Delete</button>
            </span>
          </li>
        `
        ).join("");
        list.querySelectorAll("[data-edit]").forEach((btn) => {
          btn.addEventListener("click", () => editPost(btn.dataset.edit));
        });
        list.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.addEventListener("click", () => deletePost(btn.dataset.delete));
        });
      } catch (err) {
        showError("posts-error", "Request failed.");
      }
    }

    async function loadProjects() {
      showError("projects-error");
      showSuccess("projects-success");
      try {
        const r = await fetch(API + "/api/admin/projects", { headers: apiHeaders() });
        const data = await r.json();
        if (data.error) {
          if (r.status === 401) {
            token = null;
            sessionStorage.removeItem("cms_token");
            showView("login");
            return;
          }
          showError("projects-error", data.error);
          return;
        }
        const list = document.getElementById("project-list");
        list.innerHTML = (data.projects || []).map(
          (p) => `
          <li>
            <span>
              <strong>${escapeHtml(p.title)}</strong>
              <span class="slug">/${escapeHtml(p.slug)}</span>
              <span class="published ${p.published ? "yes" : "no"}">${p.published ? "Published" : "Draft"}</span>
            </span>
            <span class="actions">
              <button type="button" class="btn-secondary" data-edit="${p.id}">Edit</button>
              <button type="button" class="btn-danger" data-delete="${p.id}">Delete</button>
            </span>
          </li>
        `
        ).join("");
        list.querySelectorAll("[data-edit]").forEach((btn) => {
          btn.addEventListener("click", () => editProject(btn.dataset.edit));
        });
        list.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.addEventListener("click", () => deleteProject(btn.dataset.delete));
        });
      } catch (err) {
        showError("projects-error", "Request failed.");
      }
    }

    document.getElementById("new-post").addEventListener("click", () => {
      document.getElementById("edit-id").value = "";
      document.getElementById("edit-slug").value = "";
      document.getElementById("edit-title-input").value = "";
      document.getElementById("edit-excerpt").value = "";
      document.getElementById("edit-content").value = "";
      document.getElementById("edit-published").checked = false;
      document.getElementById("edit-title").textContent = "New post";
      showError("edit-error");
      showView("edit");
    });

    document.getElementById("new-project").addEventListener("click", () => {
      document.getElementById("edit-project-id").value = "";
      document.getElementById("edit-project-slug").value = "";
      document.getElementById("edit-project-title-input").value = "";
      document.getElementById("edit-project-excerpt").value = "";
      document.getElementById("edit-project-hero-image").value = "";
      document.getElementById("edit-project-hero-video").value = "";
      document.getElementById("edit-project-about").value = "";
      document.getElementById("edit-project-gallery").value = "";
      document.getElementById("edit-project-gallery-caption").value = "";
      document.getElementById("edit-project-footer-cta").value = "";
      document.getElementById("edit-project-footer-email").value = "";
      document.getElementById("edit-project-tags").value = "";
      document.getElementById("edit-project-published").checked = false;
      document.getElementById("edit-project-title").textContent = "New project";
      showError("edit-project-error");
      showView("edit-project");
    });

    async function editPost(id) {
      try {
        const r = await fetch(API + "/api/admin/posts/" + id, { headers: apiHeaders() });
        const data = await r.json();
        const post = data.post;
        if (!post) {
          showError("edit-error", data.error || "Post not found.");
          return;
        }
        document.getElementById("edit-id").value = post.id;
        document.getElementById("edit-slug").value = post.slug;
        document.getElementById("edit-title-input").value = post.title;
        document.getElementById("edit-excerpt").value = post.excerpt || "";
        document.getElementById("edit-content").value = post.content || "";
        document.getElementById("edit-published").checked = !!post.published;
        document.getElementById("edit-title").textContent = "Edit post";
        showError("edit-error");
        showView("edit");
      } catch (err) {
        showError("edit-error", "Request failed.");
      }
    }

    async function editProject(id) {
      try {
        const r = await fetch(API + "/api/admin/projects/" + id, { headers: apiHeaders() });
        const data = await r.json();
        const p = data.project;
        if (!p) {
          showError("edit-project-error", data.error || "Project not found.");
          return;
        }
        document.getElementById("edit-project-id").value = p.id;
        document.getElementById("edit-project-slug").value = p.slug;
        document.getElementById("edit-project-title-input").value = p.title;
        document.getElementById("edit-project-excerpt").value = p.excerpt || "";
        document.getElementById("edit-project-hero-image").value = p.hero_image || "";
        document.getElementById("edit-project-hero-video").value = p.hero_video || "";
        document.getElementById("edit-project-about").value = p.about_text || "";
        document.getElementById("edit-project-gallery").value = (p.galleryImages || []).join("\n");
        document.getElementById("edit-project-gallery-caption").value = p.gallery_caption || "";
        document.getElementById("edit-project-footer-cta").value = p.footer_cta || "";
        document.getElementById("edit-project-footer-email").value = p.footer_email || "";
        document.getElementById("edit-project-tags").value = (p.tags || []).join(", ");
        document.getElementById("edit-project-published").checked = !!p.published;
        document.getElementById("edit-project-title").textContent = "Edit project";
        showError("edit-project-error");
        showView("edit-project");
      } catch (err) {
        showError("edit-project-error", "Request failed.");
      }
    }

    async function deletePost(id) {
      if (!confirm("Delete this post?")) return;
      try {
        const r = await fetch(API + "/api/admin/posts/" + id, { method: "DELETE", headers: apiHeaders() });
        const data = await r.json();
        if (data.error) {
          showError("posts-error", data.error);
          return;
        }
        showSuccess("posts-success", "Post deleted.");
        loadPosts();
      } catch (err) {
        showError("posts-error", "Request failed.");
      }
    }

    async function deleteProject(id) {
      if (!confirm("Delete this project?")) return;
      try {
        const r = await fetch(API + "/api/admin/projects/" + id, { method: "DELETE", headers: apiHeaders() });
        const data = await r.json();
        if (data.error) {
          showError("projects-error", data.error);
          return;
        }
        showSuccess("projects-success", "Project deleted.");
        loadProjects();
      } catch (err) {
        showError("projects-error", "Request failed.");
      }
    }

    document.getElementById("edit-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      showError("edit-error");
      const id = document.getElementById("edit-id").value;
      const body = {
        slug: document.getElementById("edit-slug").value.trim(),
        title: document.getElementById("edit-title-input").value.trim(),
        excerpt: document.getElementById("edit-excerpt").value.trim(),
        content: document.getElementById("edit-content").value.trim(),
        published: document.getElementById("edit-published").checked,
      };
      try {
        const url = id ? API + "/api/admin/posts/" + id : API + "/api/admin/posts";
        const method = id ? "PUT" : "POST";
        const r = await fetch(url, { method, headers: apiHeaders(), body: JSON.stringify(body) });
        const data = await r.json();
        if (data.error) {
          showError("edit-error", data.error);
          return;
        }
        showView("posts");
        showSuccess("posts-success", id ? "Post updated." : "Post created.");
        loadPosts();
      } catch (err) {
        showError("edit-error", "Request failed.");
      }
    });

    document.getElementById("edit-project-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      showError("edit-project-error");
      const id = document.getElementById("edit-project-id").value;
      const galleryStr = document.getElementById("edit-project-gallery").value.trim();
      const galleryImages = galleryStr ? galleryStr.split("\n").map((s) => s.trim()).filter(Boolean) : [];
      const tagsStr = document.getElementById("edit-project-tags").value.trim();
      const tags = tagsStr ? tagsStr.split(",").map((s) => s.trim()).filter(Boolean) : [];
      const body = {
        slug: document.getElementById("edit-project-slug").value.trim(),
        title: document.getElementById("edit-project-title-input").value.trim(),
        excerpt: document.getElementById("edit-project-excerpt").value.trim(),
        hero_image: document.getElementById("edit-project-hero-image").value.trim() || null,
        hero_video: document.getElementById("edit-project-hero-video").value.trim() || null,
        about_text: document.getElementById("edit-project-about").value.trim() || null,
        galleryImages,
        gallery_caption: document.getElementById("edit-project-gallery-caption").value.trim() || null,
        footer_cta: document.getElementById("edit-project-footer-cta").value.trim() || null,
        footer_email: document.getElementById("edit-project-footer-email").value.trim() || null,
        tags,
        published: document.getElementById("edit-project-published").checked,
      };
      try {
        const url = id ? API + "/api/admin/projects/" + id : API + "/api/admin/projects";
        const method = id ? "PUT" : "POST";
        const r = await fetch(url, { method, headers: apiHeaders(), body: JSON.stringify(body) });
        const data = await r.json();
        if (data.error) {
          showError("edit-project-error", data.error);
          return;
        }
        showView("projects");
        showSuccess("projects-success", id ? "Project updated." : "Project created.");
        loadProjects();
      } catch (err) {
        showError("edit-project-error", "Request failed.");
      }
    });

    document.getElementById("edit-cancel").addEventListener("click", () => showView("posts"));
    document.getElementById("edit-project-cancel").addEventListener("click", () => showView("projects"));
    document.getElementById("edit-dot-cancel").addEventListener("click", () => showView("dots"));

    document.getElementById("logout-dots").addEventListener("click", () => {
      token = null; sessionStorage.removeItem("cms_token"); showView("login");
    });

    // ── Globe Dots ────────────────────────────────────────────────────────────
    async function loadDots() {
      showError("dots-error"); showSuccess("dots-success");
      try {
        const r = await fetch(API + "/api/career-dots");
        const data = await r.json();
        if (data.error) { showError("dots-error", data.error); return; }
        const list = document.getElementById("dot-list");
        list.innerHTML = (data.dots || []).map((d) => `
          <li>
            <div class="dot-info">
              <div class="dot-label">${escapeHtml(d.label)}</div>
              <div class="dot-meta">${escapeHtml(d.year || "")}${d.year && d.text ? " · " : ""}${escapeHtml((d.text || "").slice(0, 60))}${(d.text || "").length > 60 ? "…" : ""}</div>
              <div class="coord">${d.lat}, ${d.lng} · order ${d.sort_order}</div>
            </div>
            <span class="actions">
              <button type="button" class="btn-secondary" data-dot-edit="${d.id}">Edit</button>
              <button type="button" class="btn-danger" data-dot-delete="${d.id}">Delete</button>
            </span>
          </li>
        `).join("");
        list.querySelectorAll("[data-dot-edit]").forEach((btn) => btn.addEventListener("click", () => openEditDot(btn.dataset.dotEdit, data.dots)));
        list.querySelectorAll("[data-dot-delete]").forEach((btn) => btn.addEventListener("click", () => deleteDot(btn.dataset.dotDelete)));
      } catch { showError("dots-error", "Request failed."); }
    }

    function openEditDot(id, dots) {
      const d = dots ? dots.find((x) => String(x.id) === String(id)) : null;
      document.getElementById("edit-dot-id").value = d ? d.id : "";
      document.getElementById("edit-dot-label").value = d ? d.label : "";
      document.getElementById("edit-dot-lat").value = d ? d.lat : "";
      document.getElementById("edit-dot-lng").value = d ? d.lng : "";
      document.getElementById("edit-dot-year").value = d ? (d.year || "") : "";
      document.getElementById("edit-dot-text").value = d ? (d.text || "") : "";
      document.getElementById("edit-dot-order").value = d ? d.sort_order : 0;
      document.getElementById("edit-dot-title").textContent = d ? "Edit dot" : "New dot";
      showError("edit-dot-error");
      showView("edit-dot");
    }

    document.getElementById("new-dot").addEventListener("click", () => openEditDot(null, null));

    document.getElementById("edit-dot-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      showError("edit-dot-error");
      const id = document.getElementById("edit-dot-id").value;
      const body = {
        label:      document.getElementById("edit-dot-label").value.trim(),
        lat:        parseFloat(document.getElementById("edit-dot-lat").value),
        lng:        parseFloat(document.getElementById("edit-dot-lng").value),
        year:       document.getElementById("edit-dot-year").value.trim(),
        text:       document.getElementById("edit-dot-text").value.trim(),
        sort_order: parseInt(document.getElementById("edit-dot-order").value, 10) || 0,
      };
      if (!body.label || isNaN(body.lat) || isNaN(body.lng)) {
        showError("edit-dot-error", "Label, lat, and lng are required."); return;
      }
      try {
        const url    = id ? API + "/api/admin/career-dots/" + id : API + "/api/admin/career-dots";
        const method = id ? "PUT" : "POST";
        const r = await fetch(url, { method, headers: apiHeaders(), body: JSON.stringify(body) });
        const data = await r.json();
        if (data.error) { showError("edit-dot-error", data.error); return; }
        showView("dots");
        showSuccess("dots-success", id ? "Dot updated." : "Dot added.");
        loadDots();
      } catch { showError("edit-dot-error", "Request failed."); }
    });

    async function deleteDot(id) {
      if (!confirm("Delete this dot?")) return;
      try {
        const r = await fetch(API + "/api/admin/career-dots/" + id, { method: "DELETE", headers: apiHeaders() });
        const data = await r.json();
        if (data.error) { showError("dots-error", data.error); return; }
        showSuccess("dots-success", "Dot deleted.");
        loadDots();
      } catch { showError("dots-error", "Request failed."); }
    }

    if (token) {
      showView("posts");
      loadPosts();
    } else {
      showView("login");
    }
  </script>
</body>
</html>
