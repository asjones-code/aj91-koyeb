<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — AJ91</title>
  <script>
    (function () {
      function setVh() {
        var v = window.visualViewport;
        var vh = (v && v.height) ? v.height : window.innerHeight;
        document.documentElement.style.setProperty('--vh', vh + 'px');
      }
      setVh();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setVh);
      }
      window.addEventListener('resize', setVh);
      document.addEventListener('DOMContentLoaded', setVh);
    })();
  </script>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    :root {
      --c-accent:     #abf8fe;
      --c-accent-dim: rgba(171,248,254,0.12);
      --c-border:     rgba(255,255,255,0.07);
    }

    /* ── Page shell ── */
    .blog-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── List view ── */
    .blog-index {
      flex: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 8rem 2rem 6rem;
      width: 100%;
    }
    .blog-index-eyebrow {
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(171,248,254,0.42);
      font-family: ui-monospace, monospace;
      margin-bottom: 1.25rem;
    }
    .blog-index-title {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 0.95;
      color: rgba(255,255,255,0.95);
      margin-bottom: 3.5rem;
    }
    .blog-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .blog-list-item {
      padding: 2rem 0;
      border-bottom: 1px solid var(--c-border);
      transition: border-color 0.2s;
    }
    .blog-list-item:first-child { border-top: 1px solid var(--c-border); }
    .blog-list-link {
      display: block;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }
    .blog-list-link:hover { opacity: 0.8; }
    .blog-list-link:hover .blog-list-h { color: var(--c-accent); }
    .blog-list-meta {
      font-size: 0.72rem;
      font-family: ui-monospace, monospace;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }
    .blog-list-h {
      font-size: 1.3rem;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      margin: 0 0 0.4rem;
      line-height: 1.3;
      letter-spacing: -0.02em;
      transition: color 0.2s;
    }
    .blog-list-excerpt {
      font-size: 0.9375rem;
      color: rgba(255,255,255,0.52);
      line-height: 1.55;
      margin: 0;
    }
    .blog-list-arrow {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.78rem;
      font-family: ui-monospace, monospace;
      color: rgba(171,248,254,0.5);
      letter-spacing: 0.04em;
    }

    /* ── Article view ── */
    .blog-article-wrap {
      flex: 1;
      width: 100%;
    }

    /* Big header zone */
    .blog-article-hero {
      width: 100%;
      padding: 9rem 2rem 4rem;
      border-bottom: 1px solid var(--c-border);
      max-width: 900px;
      margin: 0 auto;
    }
    .blog-article-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-family: ui-monospace, monospace;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      transition: color 0.2s;
    }
    .blog-article-back:hover { color: var(--c-accent); }
    .blog-article-eyebrow {
      font-size: 0.68rem;
      font-family: ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(171,248,254,0.42);
      margin-bottom: 1.25rem;
    }
    .blog-article-title {
      font-size: clamp(2rem, 5.5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.05;
      color: rgba(255,255,255,0.95);
      margin: 0 0 1.5rem;
      max-width: 22ch;
    }
    .blog-article-meta {
      font-size: 0.75rem;
      font-family: ui-monospace, monospace;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
    }

    /* Hero cover image */
    .blog-article-cover {
      width: 100%;
      max-height: 480px;
      overflow: hidden;
      display: none;
    }
    .blog-article-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      max-height: 480px;
    }

    /* Body content */
    .blog-article-body {
      max-width: 700px;
      margin: 0 auto;
      padding: 4rem 2rem 8rem;
    }
    .blog-content {
      font-size: 1.125rem;
      line-height: 1.82;
      color: rgba(255,255,255,0.82);
    }
    .blog-content p { margin: 0 0 1.6rem; }
    .blog-content p:last-child { margin-bottom: 0; }
    .blog-content h1, .blog-content h2, .blog-content h3 {
      color: rgba(255,255,255,0.96);
      font-weight: 700;
      letter-spacing: -0.025em;
      margin: 3rem 0 0.85rem;
      line-height: 1.2;
    }
    .blog-content h1 { font-size: 2rem; }
    .blog-content h2 { font-size: 1.5rem; }
    .blog-content h3 { font-size: 1.35rem; }
    .blog-content a {
      color: var(--c-accent);
      text-decoration: underline;
      text-decoration-color: rgba(171,248,254,0.35);
      text-underline-offset: 0.25em;
      transition: text-decoration-color 0.2s;
    }
    .blog-content a:hover { text-decoration-color: var(--c-accent); }
    .blog-content blockquote {
      border-left: 2px solid rgba(171,248,254,0.3);
      padding: 0.25rem 0 0.25rem 1.5rem;
      margin: 1.75rem 0;
      color: rgba(255,255,255,0.55);
      font-style: italic;
    }
    .blog-content pre, .blog-content code {
      font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
      font-size: 0.875rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
    }
    .blog-content code { padding: 0.1em 0.4em; }
    .blog-content pre {
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      line-height: 1.6;
    }
    .blog-content pre code { background: none; border: none; padding: 0; }
    .blog-content img {
      width: 100%;
      border-radius: 8px;
      margin: 1.75rem 0;
      display: block;
    }
    .blog-content hr {
      border: none;
      border-top: 1px solid var(--c-border);
      margin: 2.5rem 0;
    }
    .blog-content ul, .blog-content ol {
      padding-left: 1.4rem;
      margin: 0 0 1.4rem;
      color: rgba(255,255,255,0.75);
    }
    .blog-content li { margin-bottom: 0.4rem; }

    /* States */
    .blog-status {
      padding: 2rem 0;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      font-family: ui-monospace, monospace;
    }
    .blog-status--error { color: #f87171; }
    .blog-status--empty { font-style: italic; }

    /* Back link (index) */
    .blog-back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-family: ui-monospace, monospace;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .blog-back-link:hover { color: var(--c-accent); }

    /* ── List item thumbnail ── */
    .blog-list-link {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto auto auto;
      column-gap: 1.25rem;
      align-items: start;
    }
    .blog-list-meta, .blog-list-h, .blog-list-excerpt, .blog-list-arrow {
      grid-column: 1;
    }
    .blog-list-thumb {
      grid-column: 2;
      grid-row: 1 / 4;
      width: 100px;
      height: 68px;
      object-fit: cover;
      border-radius: 5px;
      flex-shrink: 0;
      align-self: center;
      display: none;
    }
    .blog-list-thumb.loaded { display: block; }

    /* ── Skeleton loading ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 4px;
    }
    .blog-skeleton-item {
      padding: 2rem 0;
      border-bottom: 1px solid var(--c-border);
      display: grid;
      grid-template-columns: 1fr 100px;
      column-gap: 1.25rem;
    }
    .blog-skeleton-item:first-child { border-top: 1px solid var(--c-border); }
    .blog-skeleton-text { grid-column: 1; display: flex; flex-direction: column; gap: 0.6rem; }
    .blog-skeleton-img { grid-column: 2; height: 68px; border-radius: 5px; }

    /* ── Footer ── */
    .blog-footer {
      border-top: 1px solid var(--c-border);
      padding: 3.5rem 0;
      margin-top: auto;
    }
    .blog-footer-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .blog-footer-brand {
      font-family: 'Kihim', ui-monospace, monospace;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.6);
    }
    .blog-footer-links {
      display: flex;
      gap: 1.25rem;
    }
    .blog-footer-links a {
      font-size: 0.78rem;
      font-family: ui-monospace, monospace;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .blog-footer-links a:hover { color: var(--c-accent); }

    @media (max-width: 640px) {
      .blog-index { padding: 6rem 1.25rem 4rem; }
      .blog-article-hero { padding: 7rem 1.25rem 3rem; }
      .blog-article-body { padding: 3rem 1.25rem 6rem; }
      .blog-list-thumb { width: 72px; height: 52px; }
      .blog-skeleton-item { grid-template-columns: 1fr 72px; }
      .blog-skeleton-img { height: 52px; }
      .blog-footer-inner { flex-direction: column; align-items: flex-start; gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container blog-shell">

    <header class="header">
      <div class="header-inner">
        <a href="/" class="header-logo logo word font-kihim">aj91</a>
        <nav class="header-nav navigation" aria-label="Main">
          <ul>
            <li><a class="font-mono" href="work.html">Work</a></li>
            <li><a class="font-mono" href="about.html">About</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="blog-main">

      <!-- ── List view ── -->
      <div id="blog-list-view" class="blog-index">
        <p class="blog-index-eyebrow font-mono">Writing</p>
        <h1 class="blog-index-title">Ideas &amp;<br>Notes</h1>
        <ul id="blog-skeleton" class="blog-list" aria-hidden="true">
          <li class="blog-skeleton-item"><div class="blog-skeleton-text"><div class="skeleton" style="width:30%;height:10px;"></div><div class="skeleton" style="width:75%;height:18px;"></div><div class="skeleton" style="width:90%;height:13px;"></div></div><div class="blog-skeleton-img skeleton"></div></li>
          <li class="blog-skeleton-item"><div class="blog-skeleton-text"><div class="skeleton" style="width:25%;height:10px;"></div><div class="skeleton" style="width:60%;height:18px;"></div><div class="skeleton" style="width:85%;height:13px;"></div></div><div class="blog-skeleton-img skeleton"></div></li>
          <li class="blog-skeleton-item"><div class="blog-skeleton-text"><div class="skeleton" style="width:28%;height:10px;"></div><div class="skeleton" style="width:70%;height:18px;"></div><div class="skeleton" style="width:80%;height:13px;"></div></div><div class="blog-skeleton-img skeleton"></div></li>
        </ul>
        <p id="blog-list-status" class="blog-status" style="display:none"></p>
        <ul id="blog-list" class="blog-list" style="display:none"></ul>
      </div>

      <!-- ── Article view ── -->
      <div id="blog-post-view" class="blog-article-wrap" style="display:none">
        <div id="blog-post-cover" class="blog-article-cover"><img id="blog-post-cover-img" alt=""></div>
        <div class="blog-article-hero">
          <a href="/journal" class="blog-article-back">← All posts</a>
          <p class="blog-article-eyebrow font-mono">Writing</p>
          <h1 id="blog-post-title" class="blog-article-title"></h1>
          <p id="blog-post-meta" class="blog-article-meta"></p>
        </div>
        <div class="blog-article-body">
          <p id="blog-post-status" class="blog-status" style="display:none"></p>
          <div id="blog-post-content" class="blog-content"></div>
        </div>
      </div>

    </main>

    <footer class="blog-footer">
      <div class="blog-footer-inner">
        <span class="blog-footer-brand font-kihim">aj91</span>
        <nav class="blog-footer-links">
          <a href="https://www.linkedin.com/in/asjones91/" target="_blank" rel="noopener">
            <i class="fa-brands fa-linkedin" aria-hidden="true"></i> LinkedIn
          </a>
          <a href="https://aj91.substack.com/" target="_blank" rel="noopener">
            <i class="fa-solid fa-newspaper" aria-hidden="true"></i> Substack
          </a>
        </nav>
      </div>
    </footer>

  </div>

  <script>
    /* Nav pill scroll effect — drives the same CSS vars as the home page */
    (function () {
      var header = document.querySelector('.header');
      if (!header) return;
      function smoothstep(t) { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); }
      function update() {
        var p = smoothstep(Math.min(1, window.scrollY / 80));
        header.style.setProperty('--nav-pill-p', p.toFixed(4));
        if (p > 0.02) header.classList.add('is-scrolled');
        else header.classList.remove('is-scrolled');
      }
      window.addEventListener('scroll', update, { passive: true });
      update();
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    (function () {
      if (window.location.port === "1234") window.API_ORIGIN = "http://localhost:3000";
      var API = (window.API_ORIGIN || window.location.origin);
      // Support both /journal/<slug> path and ?slug= query param (legacy)
      var pathMatch = window.location.pathname.match(/^\/journal\/([^/]+)$/);
      var slug = pathMatch ? decodeURIComponent(pathMatch[1]) : new URLSearchParams(window.location.search).get("slug");

      function formatDate(s) {
        if (!s) return "";
        var d = new Date(s);
        return isNaN(d) ? s : d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
      }

      function escapeHtml(s) {
        var div = document.createElement("div");
        div.textContent = s || "";
        return div.innerHTML;
      }

      if (slug) {
        /* ── Single post ── */
        document.getElementById("blog-list-view").style.display = "none";
        document.getElementById("blog-post-view").style.display = "block";
        var statusEl = document.getElementById("blog-post-status");
        statusEl.textContent = "Loading…";
        statusEl.style.display = "block";

        fetch(API + "/api/posts/" + encodeURIComponent(slug))
          .then(function(r){ return r.json(); })
          .then(function(data){
            statusEl.style.display = "none";
            if (data.error) {
              statusEl.textContent = data.error || "Post not found.";
              statusEl.className = "blog-status blog-status--error";
              statusEl.style.display = "block";
              return;
            }
            var p = data.post;
            document.title = (p.title || "Post") + " — AJ91";
            document.getElementById("blog-post-title").textContent = p.title || "Untitled";
            document.getElementById("blog-post-meta").textContent = formatDate(p.created_at);
            document.getElementById("blog-post-content").innerHTML = (typeof marked !== "undefined" ? marked.parse(p.content || "") : p.content) || "<p>No content.</p>";
            if (p.thumbnail) {
              var coverEl = document.getElementById("blog-post-cover");
              document.getElementById("blog-post-cover-img").src = p.thumbnail;
              coverEl.style.display = "block";
            }
          })
          .catch(function(){
            statusEl.textContent = "Failed to load post.";
            statusEl.className = "blog-status blog-status--error";
            statusEl.style.display = "block";
          });

      } else {
        /* ── Post list ── */
        var skeletonEl = document.getElementById("blog-skeleton");
        var statusIndex = document.getElementById("blog-list-status");
        var listEl = document.getElementById("blog-list");

        fetch(API + "/api/posts")
          .then(function(r){ return r.json(); })
          .then(function(data){
            skeletonEl.style.display = "none";
            var NO_DB_MSGS = ["Database not configured.", "Database not available."];
            if (data.error) {
              statusIndex.textContent = NO_DB_MSGS.indexOf(data.error) !== -1 ? "No posts yet." : data.error;
              statusIndex.className = "blog-status blog-status--" + (NO_DB_MSGS.indexOf(data.error) !== -1 ? "empty" : "error");
              statusIndex.style.display = "block";
              return;
            }
            var posts = data.posts || [];
            if (posts.length === 0) {
              statusIndex.textContent = "No posts yet.";
              statusIndex.className = "blog-status blog-status--empty";
              statusIndex.style.display = "block";
              return;
            }
            listEl.style.display = "block";
            listEl.innerHTML = posts.map(function(p){
              var thumb = p.thumbnail
                ? '<img class="blog-list-thumb" src="' + escapeHtml(p.thumbnail) + '" alt="" loading="lazy" onload="this.classList.add(\'loaded\')">'
                : '';
              return '<li class="blog-list-item">'
                + '<a href="/journal/' + encodeURIComponent(p.slug) + '" class="blog-list-link">'
                + '<p class="blog-list-meta">' + escapeHtml(formatDate(p.created_at)) + '</p>'
                + '<h2 class="blog-list-h">' + escapeHtml(p.title || "Untitled") + '</h2>'
                + (p.excerpt ? '<p class="blog-list-excerpt">' + escapeHtml(p.excerpt) + '</p>' : '')
                + '<span class="blog-list-arrow font-mono">Read →</span>'
                + thumb
                + '</a></li>';
            }).join("");
          })
          .catch(function(){
            skeletonEl.style.display = "none";
            statusIndex.textContent = "No posts yet.";
            statusIndex.className = "blog-status blog-status--empty";
            statusIndex.style.display = "block";
          });
      }
    })();
  </script>
  <script type="module" src="loader.js"></script>
</body>
</html>
